<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#B91C1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Barangay Gasang - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #B91C1C;
      --primary-light: #DC2626;
      --secondary: #166534;
      --secondary-light: #16A34A;
      --accent: #1D4ED8;
      --accent-light: #3B82F6;
      --background: #F9FAFB;
      --surface: #FFFFFF;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--primary);
      margin-bottom: 16px;
      object-fit: cover;
    }

    .logo-section h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .logo-section p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .login-tabs {
      display: flex;
      background: var(--background);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      background: var(--surface);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .login-btn.citizen {
      background: var(--secondary);
    }

    .login-btn.citizen:hover {
      background: var(--secondary-light);
    }

    .login-btn.officer {
      background: var(--primary);
    }

    .login-btn.officer:hover {
      background: var(--primary-light);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      padding: 0 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .register-link {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .icon-input {
      position: relative;
    }

    .icon-input svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .icon-input .form-input {
      padding-left: 44px;
    }

    .forgot-password {
      text-align: right;
      margin-top: 8px;
    }

    .forgot-password a {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .user-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .user-type-badge.citizen {
      background: #DCFCE7;
      color: var(--secondary);
    }

    .user-type-badge.officer {
      background: #FEE2E2;
      color: var(--primary);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/451121683_122094558728423832_740798893612745520_n-gPnVKt0z1EQjuNPod4NvWOMbTf7QtN.jpg" alt="Barangay Gasang Logo" class="logo">
      <h1>Barangay Gasang</h1>
      <p>Mabini, Batangas</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" onclick="switchTab('citizen')">Citizen</button>
      <button class="tab-btn" onclick="switchTab('officer')">Barangay Officer</button>
    </div>

    <!-- Citizen Login Form -->
    <form class="login-form active" id="citizen-form" onsubmit="loginCitizen(event)">
      <div class="user-type-badge citizen">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Citizen Login
      </div>

      <div class="form-group">
        <label class="form-label">Mobile Number or Email</label>
        <div class="icon-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect><path d="M12 18h.01"></path></svg>
          <input type="text" class="form-input" placeholder="09XX XXX XXXX" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="icon-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input type="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div class="forgot-password">
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="login-btn citizen">Login as Citizen</button>

      <div class="divider"><span>or</span></div>

      <p class="register-link">Don't have an account? <a href="#">Register here</a></p>
    </form>

    <!-- Officer Login Form -->
    <form class="login-form" id="officer-form" onsubmit="loginOfficer(event)">
      <div class="user-type-badge officer">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Barangay Officer Login
      </div>

      <div class="form-group">
        <label class="form-label">Officer ID</label>
        <div class="icon-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>
          <input type="text" class="form-input" placeholder="Enter your Officer ID" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="icon-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input type="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div class="forgot-password">
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="login-btn officer">Login as Officer</button>

      <div class="divider"><span>or</span></div>

      <p class="register-link">Contact Barangay Hall for officer account</p>
    </form>

    <p class="footer-text">Barangay Gasang Connect App v1.0</p>
  </div>

  <script>
    function switchTab(type) {
      // Update tabs
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      // Update forms
      document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
      document.getElementById(type + '-form').classList.add('active');
    }

    function loginCitizen(e) {
      e.preventDefault();
      // Redirect to citizen app
      window.location.href = 'citizen.html';
    }

    function loginOfficer(e) {
      e.preventDefault();
      // Redirect to officer dashboard
      window.location.href = 'officer.html';
    }
  </script>
</body>
</html>
